<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>جامعة كربلاء | استمارة شاملة</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
body{
  margin:0;
  font-family:'Cairo',sans-serif;
  color:#fff;
  scroll-behavior:smooth;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  overflow-x:hidden;
  position:relative;

  /* الخلفية الجديدة */
  background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
              url('CON.jpg') no-repeat center center fixed;
  background-size: cover;
}
.container{
width:90%;
max-width:900px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(25px);
padding:40px;
border-radius:25px;
box-shadow:0 0 60px rgba(0,0,0,0.8);
border:2px solid gold;
display:flex;
flex-direction:column;
align-items:center;
position:relative;
}
.header{text-align:center;margin-bottom:30px;}
.header h1{
margin:0;font-size:2.8em;font-weight:bold;
background: linear-gradient(90deg, red, orange, yellow, green, blue, indigo, violet);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
animation: rainbow 5s linear infinite;
}
@keyframes rainbow{
0%{background-position:0% 0%;}
100%{background-position:100% 0%;}
}
.header h2{margin:5px 0;font-weight:normal;font-size:1.5em;color:gold;}
.section{
width:100%;
background:rgba(255,255,255,0.05);
padding:25px 20px;
border-radius:20px;
margin-bottom:25px;
opacity:0;
transform:translateY(50px);
transition:0.6s cubic-bezier(0.68,-0.55,0.27,1.55);
display:flex;
flex-direction:column;
align-items:center;
}
.section.show{opacity:1; transform:translateY(0);}
.section:hover{box-shadow:0 0 35px rgba(255,215,0,0.8);}
.input-wrapper{
position:relative;
width:80%;
margin:8px 0;
display:flex; justify-content:center;
}
.input-wrapper i{
position:absolute;
left:12px;
top:50%;
transform:translateY(-50%);
color:gold;
font-size:18px;
pointer-events:none;
transition:0.3s;
}
input,select,textarea{
width:100%;
padding:12px 12px 12px 38px;
border:none;
border-radius:12px;
font-size:16px;
outline:none;
background:rgba(255,255,255,0.1);
color:#fff;
transition:0.3s;
}
input::placeholder,textarea::placeholder{color:#ddd;}
input:focus,select:focus,textarea:focus{
box-shadow:0 0 20px gold;
transform:scale(1.02);
background:rgba(255,255,255,0.15);
}
button{
padding:15px;
border:none;
border-radius:12px;
background:linear-gradient(145deg,gold,#ffb700);
font-size:18px;font-weight:bold;
cursor:pointer;
transition:0.3s;
margin:10px auto;
display:block;
}
button:hover{
transform:scale(1.08) rotate(-1deg);
box-shadow:0 0 25px gold, 0 5px 15px rgba(0,0,0,0.4);
}
.progress{width:80%;height:10px;background:#333;border-radius:10px;margin-bottom:20px;overflow:hidden;}
.progress-bar{height:100%;width:0%;background:linear-gradient(90deg,gold,#ffb700);transition:0.4s;}
.loader{border:5px solid #f3f3f3;border-top:5px solid gold;border-radius:50%;width:50px;height:50px;animation:spin 1s linear infinite;margin:20px auto;display:none;}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
.result{margin-top:20px;padding:20px;text-align:center;font-size:22px;border-radius:15px;display:none;animation:fadeUp 0.8s ease forwards;}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);}}
.stamp{margin-top:15px;font-size:22px;color:gold;font-weight:bold;display:none;animation:stamp 0.8s ease forwards;}
@keyframes stamp{from{transform:scale(0);opacity:0);} to{transform:scale(1);opacity:1);}
</style>
</head>
<body>

<div class="container">
<div class="header">
  <h1>ONX-TAQE</h1>
  <h2>جامعة كربلاء | قسم إدارة الأعمال</h2>
  <p>استمارة تقديم خريج للحصول على فرصة توظيف</p>
  <p style="margin-top:10px; font-size:18px;">
    تواصل مع الدعم عبر بوت:
    <a href="https://t.me/MEBOOTTT1_bot" target="_blank" 
       style="color: gold; font-weight:bold; text-decoration:none; background: rgba(0,0,0,0.3); padding:5px 10px; border-radius:8px;">
       @MEBOOTTT1_bot
    </a>
  </p>
</div>

<div class="progress"><div class="progress-bar" id="progressBar"></div></div>

<form id="form">
<div class="section">
<h3>المعلومات الشخصية</h3>
<div class="input-wrapper"><i class="fa fa-user"></i><input type="text" placeholder="الاسم الكامل" required></div>
<div class="input-wrapper"><i class="fa fa-calendar"></i><input type="number" id="birthYear" placeholder="سنة الميلاد" required></div>
<div class="input-wrapper"><i class="fa fa-hourglass"></i><input type="number" id="age" placeholder="العمر" readonly></div>
<div class="input-wrapper"><i class="fa fa-home"></i>
<select id="province" required>
<option value="">اختر السكن / محافظة</option>
<option>نينوى</option><option>أربيل</option><option>كركوك</option>
<option>صلاح الدين</option><option>بغداد</option><option>الأنبار</option>
<option>ديالى</option><option>واسط</option><option>الموصل</option>
<option>بابل</option><option>كربلاء</option><option>النجف</option>
<option>ميسان</option><option>ذي قار</option><option>بغداد الرصافة</option>
<option>بغداد الكرخ</option><option>الحلة</option><option>السليمانية</option><option>دهوك</option>
</select>
</div>

<!-- حقل العمل -->
<div class="input-wrapper"><i class="fa fa-briefcase"></i>
<select id="job" required>
<option value="">اختر العمل</option>
</select>
</div>

<!-- المرحلة -->
<div class="input-wrapper" id="educationLevelWrapper" style="display:none;">
<i class="fa fa-graduation-cap"></i>
<select id="educationLevel">
<option value="">المرحلة</option>
<option>ابتدائي</option>
<option>متوسط</option>
<option>اعدادي</option>
<option>جامعي</option>
</select>
</div>

<!-- الشهادة -->
<div class="input-wrapper" id="degreeWrapper" style="display:none;">
<i class="fa fa-certificate"></i>
<select id="degree">
<option value="">الشهادة</option>
<option>دبلوم</option>
<option>بكلوريوس</option>
<option>ماجستير</option>
<option>دكتوراه</option>
</select>
</div>

<div class="input-wrapper"><i class="fa fa-envelope"></i><input type="email" id="email" placeholder="البريد الإلكتروني" required></div>
<div class="input-wrapper"><i class="fa fa-phone"></i><input type="tel" id="phone" placeholder="رقم الهاتف" required style="text-align:right; direction:rtl;"></div>
<div class="input-wrapper"><i class="fa fa-venus-mars"></i>
<select id="gender" required>
<option value="">نوع الجنس</option>
<option value="male">ذكر</option>
<option value="female">أنثى</option>
</select></div>
<div class="input-wrapper"><i class="fa fa-heart"></i>
<select id="status" required>
<option value="">الحالة الاجتماعية</option>
</select></div>
<div class="input-wrapper"><i class="fa fa-sticky-note"></i><textarea placeholder="ملاحظات إضافية"></textarea></div>
</div>

<div class="section">
<h3>إرسال رسالة للدعم</h3>
<div class="input-wrapper"><i class="fa fa-comment"></i><textarea id="userMessage" placeholder="اكتب مشكلتك هنا"></textarea></div>
<button type="button" id="sendMessageBtn">ارسال الرسالة</button>
</div>

<button type="submit">ارسال وتحليل الطلب</button>
</form>

<div class="loader" id="loader"></div>
<div id="result" class="result"></div>
<div id="stamp" class="stamp">✔ تم استلام الطلب رسمياً - سيتم الرد عبر بريدك الإلكتروني</div>

<script>
// ---------- SECTIONS ANIMATION ----------
const sections=document.querySelectorAll(".section");
window.addEventListener("load",()=>{sections.forEach((sec,i)=>{setTimeout(()=>{sec.classList.add("show");},i*300);});});

// ---------- AGE CALC ----------
const birthYearInput = document.getElementById("birthYear");
const ageInput = document.getElementById("age");
birthYearInput.addEventListener("input",()=>{ageInput.value=new Date().getFullYear()-birthYearInput.value;});

// ---------- STATUS & JOB ----------
const genderSelect=document.getElementById("gender");
const statusSelect=document.getElementById("status");
const jobSelect=document.getElementById("job");
const educationWrapper=document.getElementById("educationLevelWrapper");
const degreeWrapper=document.getElementById("degreeWrapper");
const educationLevel=document.getElementById("educationLevel");
const degree=document.getElementById("degree");

genderSelect.addEventListener("change",function(){
statusSelect.innerHTML="<option value=''>الحالة الاجتماعية</option>";
statusSelect.className="";
jobSelect.innerHTML="<option value=''>اختر العمل</option>";

if(this.value==="male"){
statusSelect.innerHTML+="<option>اعزب</option><option>متزوج</option><option>منفصل</option>";
statusSelect.classList.add("status-male");
jobSelect.innerHTML+="<option>كاسب</option><option>موظف</option><option>طالب</option><option>خريج</option>";
} else if(this.value==="female"){
statusSelect.innerHTML+="<option>عزباء</option><option>متزوجة</option><option>مطلقة</option>";
statusSelect.classList.add("status-female");
jobSelect.innerHTML+="<option>ربة بيت</option><option>موظفة</option><option>طالبة</option><option>خريجة</option>";
}
educationWrapper.style.display="none";
degreeWrapper.style.display="none";
});

jobSelect.addEventListener("change",function(){
const val=this.value;
if(val==="طالب" || val==="طالبة"){
educationWrapper.style.display="flex";
degreeWrapper.style.display="none";
} else if(val==="خريج" || val==="خريجة" || val==="موظف" || val==="موظفة" || val==="كاسب" || val==="ربة بيت"){
educationWrapper.style.display="none";
degreeWrapper.style.display="flex";
} else{
educationWrapper.style.display="none";
degreeWrapper.style.display="none";
}
});

// ---------- PROGRESS BAR ----------
const form = document.getElementById("form");
const progressBar = document.getElementById("progressBar");
form.addEventListener("input",()=>{
    let inputs=form.querySelectorAll("input,select,textarea");
    let filled=0; inputs.forEach(i=>{if(i.value) filled++;});
    progressBar.style.width=(filled/inputs.length)*100+"%";
});

// ---------- SEND MESSAGE TO BOT ----------
document.getElementById("sendMessageBtn").addEventListener("click",()=>{
  const msg=document.getElementById("userMessage").value.trim();
  if(msg===""){alert("اكتب رسالتك قبل الإرسال!"); return;}
  const botToken="5612204625:AAHnkY4eeAT116JeKQaHB0OOWaawu7M96hI";
  const chatId="910624538";
  fetch(`https://api.telegram.org/bot${botToken}/sendMessage`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({chat_id:chatId,text:"📩 رسالة جديدة من المستخدم:\n"+msg})
  }).then(res=>res.json()).then(()=>{alert("تم إرسال رسالتك ✅"); document.getElementById("userMessage").value=""; })
  .catch(err=>{alert("حدث خطأ أثناء الإرسال ❌"); console.error(err);});
});

// ---------- FORM SUBMIT WITH VALIDATION ----------
form.addEventListener("submit",function(e){
e.preventDefault();

const jobVal = jobSelect.value;
if(jobVal==="طالب" || jobVal==="طالبة"){
if(!educationLevel.value){ alert("الرجاء اختيار المرحلة للطالب/الطالبة"); educationLevel.focus(); return; }
} else if(jobVal==="خريج" || jobVal==="خريجة" || jobVal==="موظف" || jobVal==="موظفة" || jobVal==="كاسب" || jobVal==="ربة بيت"){
if(!degree.value){ alert("الرجاء اختيار الشهادة"); degree.focus(); return; }
}

document.getElementById("loader").style.display="block";
setTimeout(()=>{
document.getElementById("loader").style.display="none";
let data={
الاسم:form.querySelector('input[placeholder="الاسم الكامل"]').value,
سنة_الميلاد:birthYearInput.value,
العمر:ageInput.value,
السكن:document.getElementById("province").value,
العمل:jobSelect.value,
المرحلة:educationLevel.value,
الشهادة:degree.value,
البريد_الإلكتروني:document.getElementById("email").value,
الهاتف:document.getElementById("phone").value,
الجنس:genderSelect.options[genderSelect.selectedIndex].text,
الحالة_الاجتماعية:statusSelect.options[statusSelect.selectedIndex].text,
الملاحظات:form.querySelector('textarea').value,
الوقت:new Date().toLocaleString()
};
const botToken="5612204625:AAHnkY4eeAT116JeKQaHB0OOWaawu7M96hI";
const chatId="910624538";
let message="📝 بيانات استمارة جديدة:\n\n";
for(let key in data){ message += `*${key}:* ${data[key]}\n`; }
fetch(`https://api.telegram.org/bot${botToken}/sendMessage`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({chat_id:chatId,text:message,parse_mode:"Markdown"})
}).then(res=>res.json())
.then(resp=>{console.log("تم إرسال البيانات للبوت",resp); document.getElementById("stamp").style.display="block";})
.catch(err=>console.error("خطأ في الإرسال للبوت:",err));
},1200);
});
</script>
</body>
</html>
