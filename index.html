<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarthLink Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header i {
            font-size: 3rem;
            background: linear-gradient(45deg, #00cec9, #6c5ce7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .input-group {
            margin-bottom: 20px;
            position: relative;
        }
        .input-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #fff;            font-size: 1rem;
        }
        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #00cec9;
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #6c5ce7, #00cec9);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(108,92,231,0.5); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        
        #dashboard { display: none; }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-box {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: #00cec9;
            margin: 5px 0;
        }
        .stat-label { font-size: 0.85rem; color: rgba(255,255,255,0.6); }
        
        .details {
            background: rgba(255,255,255,0.03);
            border-radius: 12px;            padding: 20px;
            margin-top: 20px;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px dashed rgba(255,255,255,0.1);
        }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { color: rgba(255,255,255,0.6); }
        .detail-value { color: #fff; font-weight: 500; text-align: left; }
        
        .message {
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            display: none;
            animation: slideDown 0.3s;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.error { background: rgba(255,118,117,0.2); border: 1px solid #ff7675; color: #ff7675; }
        .message.success { background: rgba(0,184,148,0.2); border: 1px solid #00b894; color: #00b894; }
        
        .logout {
            background: transparent;
            border: 1px solid #ff7675;
            color: #ff7675;
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
        }
        .logout:hover { background: #ff7675; color: #fff; }
        
        .debug {
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 0.8rem;
            max-height: 200px;
            overflow-y: auto;
            display: none;
            direction: ltr;
            text-align: left;        }
        .debug-toggle {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.6);
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="loginForm">
        <div class="header">
            <i class="fas fa-satellite-dish"></i>
            <h2>EarthLink Portal</h2>
        </div>
        
        <div id="messageBox" class="message"></div>
        
        <form onsubmit="handleLogin(event)">
            <div class="input-group">
                <input type="text" id="username" placeholder="اسم المستخدم" required>
                <i class="fas fa-user"></i>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="كلمة المرور" required>
                <i class="fas fa-lock"></i>
            </div>
            <button type="submit" class="btn" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
            </button>
        </form>
        
        <button class="debug-toggle" onclick="toggleDebug()">
            <i class="fas fa-bug"></i> عرض البيانات (Debug)
        </button>
        <div id="debugBox" class="debug"></div>
    </div>

    <div id="dashboard">
        <div class="header">
            <h2 id="userName">مرحباً</h2>
            <span id="statusBadge" style="background: rgba(0,184,148,0.2); color: #00b894; padding: 5px 15px; border-radius: 20px; font-size: 0.9rem;">-</span>
        </div>
                <div class="stats">
            <div class="stat-box">
                <i class="fas fa-coins" style="color: #ffeaa7; font-size: 1.5rem;"></i>
                <div class="stat-value" id="statPrice">-</div>
                <div class="stat-label">سعر الاشتراك</div>
            </div>
            <div class="stat-box">
                <i class="fas fa-calendar" style="color: #00b894; font-size: 1.5rem;"></i>
                <div class="stat-value" id="statDays">-</div>
                <div class="stat-label">أيام متبقية</div>
            </div>
            <div class="stat-box">
                <i class="fas fa-wifi" style="color: #00cec9; font-size: 1.5rem;"></i>
                <div class="stat-value" id="statType">-</div>
                <div class="stat-label">نوع الباقة</div>
            </div>
        </div>
        
        <div class="details">
            <h3 style="margin-bottom: 15px; color: #00cec9;">تفاصيل الحساب</h3>
            <div class="detail-row">
                <span class="detail-label">الاسم الكامل</span>
                <span class="detail-value" id="detName">-</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">اسم المستخدم (ID)</span>
                <span class="detail-value" id="detUserID">-</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">تاريخ الانتهاء</span>
                <span class="detail-value" id="detExpDate">-</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">عنوان IP</span>
                <span class="detail-value" id="detIP">-</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">رقم الهاتف</span>
                <span class="detail-value" id="detPhone">-</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">الوكيل</span>
                <span class="detail-value" id="detAgent">-</span>
            </div>
        </div>
        
        <button class="logout" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> خروج
        </button>
                <button class="debug-toggle" onclick="toggleDebug()">
            <i class="fas fa-code"></i> عرض البيانات الخام
        </button>
        <div id="debugBox2" class="debug"></div>
    </div>
</div>

<script>
// ==================== نفس كود Python بالضبط ====================

const API_BASE = "https://ubapi.earthlink.iq/api/user";
let currentUser = null;
let userToken = null;

// دالة مساعدة لاستخراج القيم من الـ JSON
function getValue(data, key) {
    if (!data) return '-';
    if (data[key] && data[key].value !== undefined) {
        return data[key].value;
    }
    return data[key] || '-';
}

// تسجيل الدخول - مطابق لـ Python
async function handleLogin(event) {
    event.preventDefault();
    
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');
    
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الاتصال...';
    
    try {
        // نفس الكود في Python bot
        const formData = new URLSearchParams();
        formData.append('grant_type', 'password');
        formData.append('username', username);
        formData.append('password', password);
        formData.append('Logintype', '0');
        
        console.log('📤 Sending login request...');
        console.log('URL:', API_BASE + '/Token');
        console.log('Data:', Object.fromEntries(formData));
        
        const response = await fetch(API_BASE + '/Token', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',            },
            body: formData
        });
        
        console.log('📥 Response status:', response.status);
        
        if (!response.ok) {
            const errorText = await response.text();
            console.error('❌ Error response:', errorText);
            throw new Error(`HTTP ${response.status}: ${errorText}`);
        }
        
        const data = await response.json();
        console.log('✅ Login response:', data);
        
        logDebug('Login Response:', data);
        
        if (data.access_token) {
            userToken = data.access_token;
            currentUser = username;
            
            showMessage('✅ تم تسجيل الدخول بنجاح!', 'success');
            
            // حفظ في localStorage
            localStorage.setItem('earthlink_token', userToken);
            localStorage.setItem('earthlink_user', currentUser);
            localStorage.setItem('earthlink_time', Date.now());
            
            // تحميل البيانات
            setTimeout(() => loadUserData(), 500);
        } else {
            throw new Error('لم يتم استلام توكن');
        }
        
    } catch (error) {
        console.error('❌ Login error:', error);
        showMessage(`❌ ${error.message}`, 'error');
        logDebug('Login Error:', { message: error.message, stack: error.stack });
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> تسجيل الدخول';
    }
}

// جلب بيانات المستخدم - مطابق لـ Python
async function loadUserData() {
    if (!userToken) {
        userToken = localStorage.getItem('earthlink_token');
    }
        if (!userToken) {
        showMessage('❌ لا يوجد توكن', 'error');
        return;
    }
    
    try {
        console.log('📤 Fetching user data...');
        console.log('URL:', API_BASE + '/GetUserDataAr');
        console.log('Token:', userToken.substring(0, 20) + '...');
        
        const response = await fetch(API_BASE + '/GetUserDataAr', {
            method: 'GET',
            headers: {
                'Authorization': 'Bearer ' + userToken,
                'Content-Type': 'application/json'
            }
        });
        
        console.log('📥 Response status:', response.status);
        
        if (!response.ok) {
            const errorText = await response.text();
            console.error('❌ Error response:', errorText);
            throw new Error(`HTTP ${response.status}`);
        }
        
        const data = await response.json();
        console.log('✅ User data:', data);
        
        logDebug('User Data:', data, 'debugBox2');
        
        // عرض البيانات
        displayUserData(data);
        
    } catch (error) {
        console.error('❌ Load data error:', error);
        showMessage(`❌ ${error.message}`, 'error');
        logDebug('Data Load Error:', { message: error.message, stack: error.stack }, 'debugBox2');
    }
}

// عرض البيانات في الواجهة
function displayUserData(data) {
    console.log('📊 Displaying data...');
    
    // إخفاء الفورم وإظهار الداشبورد
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    
    // استخراج القيم    const fullName = getValue(data, 'fullName');
    const userID = getValue(data, 'userID');
    const accountPrice = getValue(data, 'accountPrice');
    const accountStatus = getValue(data, 'accountStatus');
    const accountName = getValue(data, 'accountName');
    const activeDaysLeft = getValue(data, 'activeDaysLeft');
    const accountExpirationDate = getValue(data, 'accountExpirationDate');
    const userIP = getValue(data, 'userIP');
    const mobileNumber = getValue(data, 'mobileNumber');
    const agentName = getValue(data, 'agentName');
    
    // ملء البيانات
    document.getElementById('userName').textContent = 'مرحباً، ' + fullName;
    document.getElementById('statPrice').textContent = accountPrice + ' د.ع';
    document.getElementById('statType').textContent = accountName;
    document.getElementById('statDays').textContent = activeDaysLeft;
    document.getElementById('statusBadge').textContent = accountStatus;
    
    document.getElementById('detName').textContent = fullName;
    document.getElementById('detUserID').textContent = userID;
    document.getElementById('detExpDate').textContent = accountExpirationDate;
    document.getElementById('detIP').textContent = userIP;
    document.getElementById('detPhone').textContent = mobileNumber;
    document.getElementById('detAgent').textContent = agentName;
    
    console.log('✅ Data displayed successfully');
}

function logout() {
    localStorage.removeItem('earthlink_token');
    localStorage.removeItem('earthlink_user');
    localStorage.removeItem('earthlink_time');
    userToken = null;
    currentUser = null;
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('loginForm').style.display = 'block';
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
    showMessage('✅ تم تسجيل الخروج', 'success');
}

function showMessage(text, type) {
    const msg = document.getElementById('messageBox');
    msg.textContent = text;
    msg.className = 'message ' + type;
    msg.style.display = 'block';
    setTimeout(() => msg.style.display = 'none', 5000);
}

function logDebug(title, data, boxId = 'debugBox') {    const debugBox = document.getElementById(boxId);
    if (debugBox.style.display === 'block') {
        debugBox.innerHTML = `<strong style="color: #00cec9">${title}</strong>\n` + 
                            JSON.stringify(data, null, 2);
    }
}

function toggleDebug() {
    const box1 = document.getElementById('debugBox');
    const box2 = document.getElementById('debugBox2');
    box1.style.display = box1.style.display === 'block' ? 'none' : 'block';
    box2.style.display = box2.style.display === 'block' ? 'none' : 'block';
}

// التحقق من الجلسة المحفوظة عند التحميل
window.onload = function() {
    const savedToken = localStorage.getItem('earthlink_token');
    const savedTime = localStorage.getItem('earthlink_time');
    
    if (savedToken && savedTime) {
        const hoursPassed = (Date.now() - parseInt(savedTime)) / (1000 * 60 * 60);
        if (hoursPassed < 24) {
            userToken = savedToken;
            currentUser = localStorage.getItem('earthlink_user');
            showMessage('✅ جارٍ تحميل البيانات المحفوظة...', 'success');
            setTimeout(() => loadUserData(), 1000);
        } else {
            localStorage.removeItem('earthlink_token');
            localStorage.removeItem('earthlink_user');
            localStorage.removeItem('earthlink_time');
        }
    }
};
</script>

</body>
</html>
